name: Build Windows (No Signing)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Configure LLVM (bindgen)
        run: |
          echo "LIBCLANG_PATH=C:\Program Files\LLVM\bin" >> $env:GITHUB_ENV

      - name: Build Tauri
        run: npm run tauri build

      - name: Find exe files
        run: Get-ChildItem -Path src-tauri/target/release -Filter "*.exe" -Recurse | Select-Object FullName, Length

      - name: Upload single exe
        uses: actions/upload-artifact@v4
        with:
          name: codex-monitor-exe
          path: src-tauri/target/release/codex-monitor.exe